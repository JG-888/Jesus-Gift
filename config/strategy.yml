# ============================================================
# Scalping Strategy Configuration   (COLD MEMORY — you own this)
# ------------------------------------------------------------
# Single source of truth for every numeric parameter.
# The agent READS this each run and must never write to it.
# Fill in the blank values below. Leave a key empty until you
# have decided it — do not invent placeholder numbers.
# ============================================================

# --- Risk Parameters ---
max_position_size_pct:        # position size as % of account
stop_loss_pct:                # stop-loss distance in %
take_profit_pct:              # take-profit target in %
max_daily_loss_pct:           # daily loss that halts trading
max_concurrent_positions:     # max simultaneous open positions
min_risk_reward:              # minimum acceptable reward:risk (e.g. 1.0)

# --- Entry Signals ---
# Define your entry conditions / indicator thresholds here.
# (left blank intentionally — your strategy, not yet written)

# --- Exit Conditions ---
max_hold_time_minutes:        # force-exit after this long in a trade
trailing_stop_pct:            # trailing-stop distance (optional)

# --- Universe ---
symbols: []                   # e.g. [BTC/USD, ETH/USD, SOL/USD]
timeframes: []                # e.g. [1m, 5m]

# --- Execution ---
# trading_hours:              # crypto trades 24/7 — only set a window if you want one
min_spread_pct:               # minimum acceptable bid-ask spread
slippage_tolerance_pct:       # max acceptable slippage
