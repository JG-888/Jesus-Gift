# ============================================================
# STRATEGY: Low-float small-cap parabolic short ("first red day")
# Taught by JesseG. Reported success rate ~80% when ALL criteria are met.
# ------------------------------------------------------------
# COLD MEMORY — human-owned. The agent READS this every run, never writes it.
# These numbers are the single source of truth. config/rules.md explains HOW
# to apply them (judgment, procedure, do's & don'ts). Read both before trading.
# ============================================================

meta:
  name: "Low-float parabolic short (first red day)"
  asset_class: us_equities          # small-cap STOCKS (this is NOT crypto)
  direction: short_only             # long trades may be added later, with experience
  broker: TradeZero
  reported_win_rate_pct: 80
  status: live_small_account

# --- TIMEFRAMES ---
timeframes:
  selection: "daily"      # pre-market scan (finviz/Yahoo): prior-day 100%+ gain, volume/float, parabola
  execution: "1m"         # intraday entry/timing/exit are read on the 1-MINUTE chart in TradeZero

# --- SELECTION CRITERIA (require_* items must all be true; prefer_/soft_ items are signals) ---
criteria:
  min_prior_day_gain_pct: 100          # up >=100% the day (or days) before
  soft_floor_prior_day_gain_pct: 90    # discretionary: a lone ~90% standout may qualify
  min_volume_to_float_ratio: 10        # day volume >= ~10x float (minimum; higher is better)
  soft_floor_volume_to_float_ratio: 7  # 7-8x occasionally usable, but prefer >=10x
  min_share_price_usd: 0.50            # TradeZero cannot short under $0.50
  require_momentum_shift_down: true    # a CLEAR change of momentum (price correcting / rolling over);
                                       # NOT limited to literally "red" -- see momentum_shift_forms below.
                                       # Do NOT reject a candidate just because it is not literally red.
  momentum_shift_forms:
    red_on_day: "parabola FULLY corrected during the PRIOR market day -> opens RED vs yesterday and keeps dropping (the clearer 'low-hanging fruit' case)"
    mid_downfall_not_yet_red: "UNFINISHED parabola still completing its down curve, continuing to drop into/after the 09:30 open; not red yet but momentum clearly shifted -> VALID (not called 'low-hanging fruit')"
  require_resistance_level: true       # a prior high-volume resistance must exist (anchors the stop)
  prefer_parabola_arc: true            # an "n"/inverted-U rolling over into the close is the STRONGEST setup
  # A chart already FLATTENED/corrected in pre-market is NOT an auto-skip: it LOWERS the odds
  #   (move may be partly spent) -> be more attentive. Owner's experience: near-breakeven days
  #   (a few cents profit), rarely a loss, after sitting the full session.
  # If there is NO resistance level -> SKIP (no safe risk; wait for it to peak and form one).

# --- FLOAT / VOLUME ESTIMATION (when sources disagree) ---
float_estimation:
  method: average_across_sources       # knowyourfloat lists SEVERAL float figures; finviz adds one more
  exclude_outliers: true               # drop any figure far from the cluster, then average the rest
  outlier_example: "if 3 of ~4 figures agree within ~5M and one is ~30M off, drop the outlier"
  applies_to: ["float", "volume"]      # use the same averaging-minus-outliers for volume

# --- TIMING (US Eastern Time) ---
timing:
  timezone: America/New_York
  entry_no_earlier_than: "09:29"       # short at/just before the open; never before 09:29
  session_guideline: "09:30-11:30"     # GUIDELINE only (suits a human with limited hours), NOT a hard
                                       # limit. The agent has no time cap and may work past 11:30 once
                                       # it has learned profitable improvements. Early on, wrap up ~11:30.
  impatience_times: ["09:50", "10:00", "10:30"]  # morning flushes -- APPROXIMATE ("around" these times)
  impatience_approx_variance_min: 15   # the whole cluster can shift ~5-15 min EITHER side (before OR after)
  cover_target: last_impatience_flush  # aim to cover at the LAST flush (around 10:30) = the lowest point
  last_impatience_time: "10:30"        # day-end anchor: when this last flush comes, cover & end the day
  low_volume_window: "12:00-15:00"     # demand slows
  max_trades_per_day: 1                # one short per day, then done

# --- ENTRY ---
entry:
  when: "short just before the 09:30 open, anticipating the drop"
  only_short_top_of_failed_push: true  # if it pops after the open, short the TOP once the up-move ends
  if_drops_immediately: "enter as fast as possible (no pre-drop pop is coming)"
  if_unclear_trend: "wait until a trend is identifiable"
  use_half_then_add_on_ascend: false   # JesseG suggests it; user found it fails -> DO NOT do this

# --- STOP / RISK ---
stop:
  type: resistance_level
  placement: second_resistance         # set the cover-ceiling at the 2nd resistance, not the 1st
  trail_down: true                     # TRAIL the cover-stop DOWN to the next lower support/resistance
                                       # as the stock falls -- every trade; cuts risk + locks in profit.
                                       # When the initial high-vol stop is far above entry, drop to a
                                       # nearer level (e.g. the intraday day high) for a tighter invalidation.
  fixed_pct: null                      # NOT a fixed percentage; the resistance defines the risk
  on_market_halt: not_an_auto_exit     # halts are NOT a forced exit -- JesseG trades through them.
                                       # Early on (no agent experience yet), a halt tends to kill
                                       # momentum, so STRONGLY CONSIDER banking any profit already made,
                                       # even before an impatience flush. Refine with experience.
  note: "subject to refinement by the agent with experience, as long as it increases profit"

# --- EXIT / TAKE PROFIT ---
exit:
  method: cover_at_last_impatience_flush   # cover at the LAST flush (around 10:30) = lowest point
  hold_through_early_flushes: true     # the 09:50 and 10:00 flushes are CONFIRMATION the setup works;
                                       # do NOT cover there -- keep holding for the last flush
  last_flush_may_delay: true           # the LAST flush can run later than the usual variance; the tell
                                       # it is still coming (just delayed) is that the first two flushes
                                       # (~09:50 & ~10:00) already happened -> keep waiting, don't cover early
  no_lower_cover_limit: true           # don't cap the downside; capture the full move
  if_missed_the_bottom: "cover anyway, then done for the day"
  tell_more_downside: "if it drops then stalls BEFORE a flush, it is coiling to drop further at the flush -> wait"

# --- POSITION SIZING ---
sizing:
  account_fraction: 0.5                # use ~half the account (broker buying-power limited)
  share_lot_size: 100                  # shares are borrowed in lots of 100
  only_when_required_criteria_met: true # size up only because the criteria give the ~80% edge
  rationale: "TradeZero gives ~half of capital as usable short buying power; borrow only what you can use (avoid extra borrow fees)"

# --- CAPITAL MANAGEMENT ---
capital:
  profit_payout_pct: 50                # pay yourself 50% of profits
  profit_reinvest_pct: 50              # reinvest 50% to grow capital
  withdraw_principal_after_double: true # once capital doubles, withdraw original principal; trade only earned money
  trade_only_unattached_money: true

# --- DATA SOURCES (pre-market workflow) ---
data_sources:
  gainers: "finviz.com"                # find biggest prior-day gainers — CHECK BEFORE 09:30 (resets after open)
  float: ["knowyourfloat.com", "finance.yahoo.com (Summary>Statistics>Share Statistics>Float)", "finviz.com"]
  chart: "finance.yahoo.com (use the 5-DAY '5D' view)"  # 5D shows the prior day, its close, and current
                                                        # pre-market in one frame; confirm parabola rolling over
